<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Live Prices</title>

<style>
    body {
        background: #0f172a;
        color: #e2e8f0;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 10px;
        font-size: 12px;
    }

    h1 {
        font-size: 18px;
        margin: 0 0 10px 0;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #020617;
        font-size: 11px;
    }

    th, td {
        padding: 10px 6px;
        text-align: center;
        white-space: nowrap;
    }

    th {
        background: #1e293b;
        font-size: 12px;
    }

    tr {
        border-bottom: 1px solid #1e293b;
    }

    /* Células de valor - impedem quebra */
    td.bid .value, 
    td.ask .value {
        display: inline-block;
        white-space: nowrap;
    }

    .bid { color: #22c55e; }
    .ask { color: #ef4444; }
    .spread { color: #38bdf8; }

    /* Container para valor + seta - sem quebra */
    td.bid, td.ask {
        white-space: nowrap;
    }

    .arrow {
        display: inline-block;
        margin-left: 4px;
        font-size: 11px;
        opacity: 0.9;
        white-space: nowrap;
    }

    .arrow.up {
        color: #22c55e;
    }

    .arrow.down {
        color: #ef4444;
    }

    /* Responsividade para celular */
    @media (max-width: 600px) {
        body {
            padding: 5px;
            font-size: 10px;
        }

        h1 {
            font-size: 16px;
            margin: 0 0 8px 0;
        }

        table {
            font-size: 10px;
        }

        th, td {
            padding: 8px 3px;
        }

        th {
            font-size: 11px;
        }

        /* Reduz tamanho da seta em celular */
        .arrow {
            font-size: 9px;
            margin-left: 2px;
        }

        /* Permite scroll horizontal se necessário */
        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
    }

    /* Para telas muito pequenas */
    @media (max-width: 480px) {
        td.bid, td.ask {
            font-size: 9px;
        }
        
        .arrow {
            font-size: 8px;
            margin-left: 1px;
        }
        
        th, td {
            padding: 6px 2px;
        }
    }
</style>
</head>

<body>

<h1>Market Prices</h1>

<div class="table-container">
    <table id="prices">
        <thead>
            <tr>
                <th>Symbol</th>
                <th>Bid</th>
                <th>Ask</th>
                <th>Spread</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
</div>

<script>

const WS_URL = "wss://wss.bmsmercosul.com/prices"; 

const tableBody = document.querySelector("#prices tbody");
const state = {};

// cria linha
function createRow(symbol) {
    const tr = document.createElement("tr");

    const tdSymbol = document.createElement("td");
    tdSymbol.textContent = symbol;
    
    const tdBid = document.createElement("td");
    tdBid.className = "bid";
    const bidSpan = document.createElement("span");
    bidSpan.className = "value";
    tdBid.appendChild(bidSpan);
    
    const tdAsk = document.createElement("td");
    tdAsk.className = "ask";
    const askSpan = document.createElement("span");
    askSpan.className = "value";
    tdAsk.appendChild(askSpan);
    
    const tdSpread = document.createElement("td");
    tdSpread.className = "spread";
    
    tr.appendChild(tdSymbol);
    tr.appendChild(tdBid);
    tr.appendChild(tdAsk);
    tr.appendChild(tdSpread);
    
    tableBody.appendChild(tr);
    return tr;
}

// controla seta com timeout seguro
function setArrow(cell, direction) {
    if (cell._arrowTimer) {
        clearTimeout(cell._arrowTimer);
        cell._arrowTimer = null;
    }

    // Remove seta antiga
    const old = cell.querySelector(".arrow");
    if (old) old.remove();

    if (!direction) return;

    const arrow = document.createElement("span");
    arrow.classList.add("arrow", direction);
    arrow.textContent = direction === "up" ? "↑" : "↓";
    
    // Sem espaço extra antes da seta
    arrow.style.whiteSpace = "nowrap";

    cell.appendChild(arrow);

    cell._arrowTimer = setTimeout(() => {
        if (arrow && arrow.parentNode) {
            arrow.remove();
        }
        cell._arrowTimer = null;
    }, 3000);
}

function updateRow(data) {
    let row = state[data.symbol]?.row;

    if (!row) {
        row = createRow(data.symbol);
        state[data.symbol] = { row };
    }

    const bidCell = row.children[1];
    const askCell = row.children[2];
    const spreadCell = row.children[3];

    const bidValue = bidCell.querySelector(".value");
    const askValue = askCell.querySelector(".value");

    const prevBid = state[data.symbol]?.bid;
    const prevAsk = state[data.symbol]?.ask;

    if (data.bid === undefined || data.ask === undefined) {
        console.warn("Tick inválido:", data);
        return;
    }

    // BID direção
    if (prevBid !== undefined) {
        if (data.bid > prevBid) setArrow(bidCell, "up");
        else if (data.bid < prevBid) setArrow(bidCell, "down");
    }

    // ASK direção
    if (prevAsk !== undefined) {
        if (data.ask > prevAsk) setArrow(askCell, "up");
        else if (data.ask < prevAsk) setArrow(askCell, "down");
    }

    // atualiza valores
    bidValue.textContent = data.bid;
    askValue.textContent = data.ask;

    // spread
    if (data.spread === undefined) {
        console.warn("Spread ausente:", data);
        spreadCell.textContent = "-";
    } else {
        spreadCell.textContent = data.spread;
    }

    // salva estado
    state[data.symbol].bid = data.bid;
    state[data.symbol].ask = data.ask;
}

function handleMessage(msg) {
    try {
        const parsed = JSON.parse(msg.data);
        if (!parsed.data) return;

        const payload = parsed.data;

        if (Array.isArray(payload)) {
            for (const item of payload) {
                updateRow(item);
            }
        } else {
            updateRow(payload);
        }
    } catch (err) {
        console.error("Erro ao processar mensagem:", err);
    }
}

function connect() {
    const ws = new WebSocket(WS_URL);

    ws.onmessage = handleMessage;

    ws.onclose = () => {
        console.log("WebSocket fechado, reconectando em 2s...");
        setTimeout(connect, 2000);
    };
    ws.onerror = () => {
        console.log("Erro no WebSocket");
        ws.close();
    };
}

connect();
</script>

</body>
</html>
